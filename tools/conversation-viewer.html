<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>AGP Conversation Viewer</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --radius: 12px;
        --radius-sm: 8px;
        --tr: 0.2s ease;
      }
      [data-theme="dark"] {
        --bg0: #0b1120;
        --bg1: #0f172a;
        --bg2: #1e293b;
        --bg3: #334155;
        --bd: #334155;
        --bd2: #475569;
        --bd-glow: #818cf8;
        --tx1: #f8fafc;
        --tx2: #94a3b8;
        --tx3: #64748b;
        --user: #818cf8;
        --user-bg: rgba(129, 140, 248, 0.08);
        --user-bd: rgba(129, 140, 248, 0.3);
        --ai: #22d3ee;
        --ai-bg: rgba(34, 211, 238, 0.05);
        --ai-bd: rgba(34, 211, 238, 0.2);
        --green: #22c55e;
        --amber: #f59e0b;
        --red: #ef4444;
        --blue: #3b82f6;
        --think-bg: rgba(245, 158, 11, 0.06);
        --think-bd: rgba(245, 158, 11, 0.25);
        --tool-bg: rgba(59, 130, 246, 0.06);
        --tool-bd: rgba(59, 130, 246, 0.25);
        --cp-bg: rgba(245, 158, 11, 0.05);
        --cp-bd: rgba(245, 158, 11, 0.2);
        --hero: linear-gradient(135deg, #818cf8, #22d3ee);
        --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        --code-bg: #0d1117;
        --glass-bg: rgba(15, 23, 42, 0.85);
        --glass-bd: rgba(51, 65, 85, 0.6);
      }
      [data-theme="light"] {
        --bg0: #f1f5f9;
        --bg1: #f8fafc;
        --bg2: #ffffff;
        --bg3: #f1f5f9;
        --bd: #e2e8f0;
        --bd2: #cbd5e1;
        --bd-glow: #6366f1;
        --tx1: #0f172a;
        --tx2: #64748b;
        --tx3: #94a3b8;
        --user: #6366f1;
        --user-bg: rgba(99, 102, 241, 0.06);
        --user-bd: rgba(99, 102, 241, 0.25);
        --ai: #0891b2;
        --ai-bg: rgba(8, 145, 178, 0.04);
        --ai-bd: rgba(8, 145, 178, 0.18);
        --green: #16a34a;
        --amber: #d97706;
        --red: #dc2626;
        --blue: #2563eb;
        --think-bg: rgba(217, 119, 6, 0.06);
        --think-bd: rgba(217, 119, 6, 0.25);
        --tool-bg: rgba(37, 99, 235, 0.05);
        --tool-bd: rgba(37, 99, 235, 0.2);
        --cp-bg: rgba(217, 119, 6, 0.04);
        --cp-bd: rgba(217, 119, 6, 0.2);
        --hero: linear-gradient(135deg, #6366f1, #0891b2);
        --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        --code-bg: #f6f8fa;
        --glass-bg: rgba(248, 250, 252, 0.85);
        --glass-bd: rgba(226, 232, 240, 0.8);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Fira Sans", sans-serif;
        background: var(--bg0);
        color: var(--tx1);
        min-height: 100vh;
      }
      .container {
        max-width: 880px;
        margin: 0 auto;
        padding: 28px 16px;
        position: relative;
      }
      /* Header */
      .hdr {
        text-align: center;
        margin-bottom: 32px;
      }
      .hdr h1 {
        font-family: "Fira Code", monospace;
        font-size: 1.8rem;
        font-weight: 700;
        background: var(--hero);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 6px;
      }
      .hdr p {
        color: var(--tx2);
        font-size: 0.88rem;
        line-height: 1.6;
        max-width: 520px;
        margin: 0 auto;
      }
      .hdr .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 10px;
        padding: 4px 14px;
        background: var(--bg2);
        border: 1px solid var(--bd);
        border-radius: 20px;
        font-size: 0.72rem;
        color: var(--tx2);
        font-weight: 500;
      }
      /* Dropzone */
      .dz {
        border: 2px dashed var(--bd);
        border-radius: var(--radius);
        padding: 52px 24px;
        text-align: center;
        cursor: pointer;
        background: var(--bg1);
        transition: all var(--tr);
      }
      .dz:hover,
      .dz.over {
        border-color: var(--bd-glow);
        background: var(--bg2);
        box-shadow: var(--shadow);
      }
      .dz h3 {
        font-family: "Fira Code", monospace;
        font-size: 1rem;
        font-weight: 600;
        margin: 12px 0 4px;
        color: var(--tx1);
      }
      .dz p {
        color: var(--tx2);
        font-size: 0.82rem;
      }
      .dz .icn {
        color: var(--tx3);
        margin-bottom: 4px;
      }
      #fi {
        display: none;
      }
      /* Theme toggle */
      .tt {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 200;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        border: 1px solid var(--bd);
        background: var(--bg2);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--tr);
        box-shadow: var(--shadow);
        color: var(--tx2);
      }
      .tt:hover {
        border-color: var(--bd-glow);
        color: var(--user);
        transform: scale(1.08);
      }
      /* Viewer */
      #vw {
        display: none;
      }
      /* Meta */
      .meta {
        background: var(--bg2);
        border: 1px solid var(--bd);
        border-radius: var(--radius);
        padding: 20px;
        margin-bottom: 16px;
      }
      .meta h2 {
        font-family: "Fira Code", monospace;
        font-size: 1.2rem;
        font-weight: 700;
        margin-bottom: 2px;
      }
      .meta .sub {
        color: var(--tx2);
        font-size: 0.78rem;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .mg {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 8px;
      }
      .mi {
        background: var(--bg1);
        border-radius: var(--radius-sm);
        padding: 10px 12px;
      }
      .mi .l {
        font-size: 0.65rem;
        color: var(--tx3);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 2px;
        font-weight: 500;
      }
      .mi .v {
        font-size: 0.95rem;
        font-weight: 700;
        font-family: "Fira Code", monospace;
      }
      /* Cost */
      .cr {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 16px;
      }
      @media (max-width: 600px) {
        .cr {
          grid-template-columns: 1fr;
        }
      }
      .cc {
        background: var(--bg2);
        border: 1px solid var(--bd);
        border-radius: var(--radius);
        padding: 16px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      .cc::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
      }
      .cc.un::after {
        background: linear-gradient(90deg, var(--red), #f97316);
      }
      .cc.ca::after {
        background: linear-gradient(90deg, var(--blue), #22d3ee);
      }
      .cc.ag::after {
        background: linear-gradient(90deg, var(--green), #34d399);
      }
      .cc .cl {
        font-size: 0.68rem;
        color: var(--tx2);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }
      .cc .cv {
        font-size: 1.5rem;
        font-weight: 800;
        font-family: "Fira Code", monospace;
      }
      .cc.un .cv {
        color: var(--red);
      }
      .cc.ca .cv {
        color: var(--blue);
      }
      .cc.ag .cv {
        color: var(--green);
      }
      .cc .cs {
        font-size: 0.66rem;
        color: var(--tx3);
        margin-top: 3px;
      }
      /* Toolbar */
      .tb {
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin-bottom: 16px;
        padding: 10px 14px;
        border-radius: var(--radius);
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-bd);
      }
      .tb input {
        flex: 1;
        min-width: 180px;
        padding: 7px 12px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--bd);
        background: var(--bg1);
        color: var(--tx1);
        font-size: 0.82rem;
        font-family: "Fira Sans", sans-serif;
        outline: none;
        transition: border-color var(--tr);
      }
      .tb input:focus {
        border-color: var(--bd-glow);
      }
      .tb input::placeholder {
        color: var(--tx3);
      }
      .btn {
        padding: 6px 12px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--bd);
        background: var(--bg1);
        color: var(--tx2);
        font-size: 0.74rem;
        font-family: "Fira Sans", sans-serif;
        font-weight: 500;
        cursor: pointer;
        transition: all var(--tr);
        display: inline-flex;
        align-items: center;
        gap: 4px;
        white-space: nowrap;
      }
      .btn:hover {
        border-color: var(--bd-glow);
        color: var(--tx1);
      }
      .btn.act {
        background: var(--user);
        color: #fff;
        border-color: var(--user);
      }
      .fg {
        display: flex;
        gap: 3px;
      }
      .sc {
        font-size: 0.72rem;
        color: var(--tx3);
        font-family: "Fira Code", monospace;
      }
      /* Timeline */
      .tl {
        position: relative;
      }
      /* Message cards */
      .mc {
        border-radius: var(--radius);
        padding: 14px 18px;
        margin-bottom: 10px;
        border: 1px solid;
        transition: opacity var(--tr);
        word-wrap: break-word;
        overflow-wrap: break-word;
        position: relative;
        border-left: 3px solid;
      }
      .mc.fo {
        display: none;
      }
      .mc.sm {
        opacity: 0.15;
      }
      .mc.sh {
        opacity: 1;
      }
      .mc.usr {
        background: var(--user-bg);
        border-color: var(--user-bd);
        border-left-color: var(--user);
      }
      .mc.ast {
        background: var(--ai-bg);
        border-color: var(--ai-bd);
        border-left-color: var(--ai);
      }
      .mc.cpk {
        background: var(--cp-bg);
        border-color: var(--cp-bd);
        border-left-color: var(--amber);
        padding: 8px 16px;
        max-width: 680px;
        margin: 14px auto;
      }
      /* Header */
      .mh {
        display: flex;
        align-items: center;
        gap: 7px;
        margin-bottom: 6px;
        flex-wrap: wrap;
      }
      .mr {
        font-weight: 700;
        font-size: 0.74rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .mc.usr .mr {
        color: var(--user);
      }
      .mc.ast .mr {
        color: var(--ai);
      }
      .ms {
        font-size: 0.65rem;
        color: var(--tx3);
        font-family: "Fira Code", monospace;
      }
      .mt {
        font-size: 0.62rem;
        padding: 2px 7px;
        border-radius: 8px;
        background: rgba(129, 140, 248, 0.1);
        color: var(--user);
        font-weight: 500;
      }
      .mbi {
        font-size: 0.67rem;
        display: inline-flex;
        align-items: center;
        gap: 2px;
      }
      /* Content */
      .mct {
        font-size: 0.88rem;
        line-height: 1.7;
        color: var(--tx1);
      }
      .mct p {
        margin-bottom: 0.7em;
      }
      .mct p:last-child {
        margin-bottom: 0;
      }
      .mct h2 {
        font-size: 1.1rem;
        margin: 0.8em 0 0.4em;
        font-weight: 700;
      }
      .mct h3 {
        font-size: 1rem;
        margin: 0.7em 0 0.3em;
        font-weight: 600;
      }
      .mct ul,
      .mct ol {
        padding-left: 1.4em;
        margin-bottom: 0.7em;
      }
      .mct li {
        margin-bottom: 0.25em;
      }
      .mct code {
        font-family: "Fira Code", monospace;
        font-size: 0.8em;
        padding: 2px 5px;
        border-radius: 4px;
        background: var(--code-bg);
      }
      .mct pre {
        border-radius: var(--radius-sm);
        padding: 12px;
        margin: 0.7em 0;
        overflow-x: auto;
        background: var(--code-bg) !important;
        font-size: 0.78rem;
        line-height: 1.5;
      }
      .mct pre code {
        padding: 0;
        background: transparent !important;
        font-size: inherit;
      }
      .mct table {
        width: 100%;
        border-collapse: collapse;
        margin: 0.7em 0;
        font-size: 0.82rem;
      }
      .mct th,
      .mct td {
        border: 1px solid var(--bd);
        padding: 6px 9px;
        text-align: left;
      }
      .mct th {
        background: var(--bg1);
        font-weight: 600;
        font-size: 0.78rem;
      }
      .mct blockquote {
        border-left: 3px solid var(--user);
        padding: 6px 14px;
        margin: 0.7em 0;
        background: var(--bg1);
        border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        color: var(--tx2);
      }
      .mct a {
        color: var(--blue);
        text-decoration: none;
      }
      .mct a:hover {
        text-decoration: underline;
      }
      .mct strong {
        font-weight: 600;
      }
      .mct img {
        max-width: 100%;
        border-radius: var(--radius-sm);
      }
      /* Truncation */
      .trunc .mct {
        max-height: 380px;
        overflow: hidden;
        position: relative;
      }
      .trunc .mct::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 50px;
        background: linear-gradient(transparent, var(--bg2));
      }
      .mc.usr .trunc .mct::after {
        background: linear-gradient(transparent, rgba(129, 140, 248, 0.08));
      }
      .mc.ast .trunc .mct::after {
        background: linear-gradient(transparent, rgba(34, 211, 238, 0.05));
      }
      .xb {
        display: block;
        width: 100%;
        margin-top: 4px;
        padding: 5px;
        background: transparent;
        border: 1px dashed var(--bd);
        border-radius: var(--radius-sm);
        color: var(--user);
        font-size: 0.75rem;
        font-family: "Fira Sans", sans-serif;
        cursor: pointer;
        transition: all var(--tr);
      }
      .xb:hover {
        background: var(--bg1);
      }
      /* Panels */
      .pn {
        margin-top: 8px;
        border: 1px solid;
        border-radius: var(--radius-sm);
        overflow: hidden;
      }
      .ph {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 7px 12px;
        cursor: pointer;
        font-size: 0.75rem;
        font-weight: 600;
        transition: background var(--tr);
        user-select: none;
      }
      .ph:hover {
        filter: brightness(1.08);
      }
      .ph .ar {
        margin-left: auto;
        transition: transform var(--tr);
        color: var(--tx3);
      }
      .ph.op .ar {
        transform: rotate(180deg);
      }
      .pb {
        display: none;
        padding: 10px 12px;
        font-size: 0.82rem;
        line-height: 1.6;
        max-height: 480px;
        overflow-y: auto;
      }
      .pb.op {
        display: block;
      }
      .pn.tk {
        border-color: var(--think-bd);
      }
      .pn.tk .ph {
        background: var(--think-bg);
        color: var(--amber);
      }
      .pn.tk .pb {
        background: var(--think-bg);
        color: var(--tx2);
        font-style: italic;
        white-space: pre-wrap;
      }
      .pn.tl {
        border-color: var(--tool-bd);
      }
      .pn.tl .ph {
        background: var(--tool-bg);
        color: var(--blue);
      }
      .pn.tl .pb {
        background: var(--tool-bg);
      }
      .tc {
        margin-bottom: 8px;
        padding: 7px 9px;
        background: var(--bg1);
        border-radius: var(--radius-sm);
        font-family: "Fira Code", monospace;
        font-size: 0.73rem;
        line-height: 1.5;
      }
      .tc:last-child {
        margin-bottom: 0;
      }
      .tc .tn {
        font-weight: 700;
        color: var(--blue);
        margin-bottom: 3px;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .tc .ta {
        color: var(--tx2);
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 180px;
        overflow-y: auto;
      }
      /* Checkpoint */
      .cpi {
        display: flex;
        gap: 16px;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        font-size: 0.75rem;
        color: var(--tx2);
        font-family: "Fira Code", monospace;
      }
      .cpi .cpl {
        font-weight: 700;
        color: var(--amber);
        font-family: "Fira Sans", sans-serif;
        text-transform: uppercase;
        font-size: 0.65rem;
        letter-spacing: 0.7px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .cpi .cps span {
        font-weight: 600;
        color: var(--tx1);
      }
      /* Footer */
      footer {
        text-align: center;
        margin-top: 36px;
        padding: 18px;
        color: var(--tx3);
        font-size: 0.72rem;
        line-height: 1.7;
      }
      footer a {
        color: var(--user);
        text-decoration: none;
      }
      @media (max-width: 640px) {
        .container {
          padding: 12px 10px;
        }
        .hdr h1 {
          font-size: 1.4rem;
        }
      }
    </style>
    <script>
      (function () {
        var s = localStorage.getItem("agp-vt"),
          d = matchMedia("(prefers-color-scheme:dark)").matches;
        document.documentElement.setAttribute(
          "data-theme",
          s || (d ? "dark" : "light"),
        );
      })();
    </script>
  </head>
  <body>
    <button class="tt" id="tt" title="Toggle theme">
      <i data-lucide="moon" style="width: 18px; height: 18px"></i>
    </button>
    <div class="container">
      <header class="hdr">
        <h1>AGP Conversation Viewer</h1>
        <p>
          上传 AGP 导出的对话 JSON，可视化完整对话内容。查看 AI
          推理过程、工具调用和 Token 统计。
        </p>
        <span class="badge"
          ><i data-lucide="lock" style="width: 12px; height: 12px"></i>
          完全本地解析 · 不上传任何数据</span
        >
      </header>
      <div class="dz" id="dz">
        <i
          data-lucide="file-json"
          style="width: 40px; height: 40px"
          class="icn"
        ></i>
        <h3>拖放 JSON 文件到这里</h3>
        <p>或点击选择 AGP 对话导出文件</p>
        <input type="file" id="fi" accept=".json" />
      </div>
      <div id="vw">
        <div id="mp" class="meta"></div>
        <div id="cro" class="cr"></div>
        <div class="tb" id="tb">
          <input id="sb" type="text" placeholder="搜索对话内容…" />
          <span class="sc" id="scc"></span>
          <div class="fg">
            <button class="btn act" data-f="all" onclick="sf('all', this)">
              全部
            </button>
            <button class="btn" data-f="user" onclick="sf('user', this)">
              <i data-lucide="user" style="width: 13px; height: 13px"></i> 用户
            </button>
            <button
              class="btn"
              data-f="assistant"
              onclick="sf('assistant', this)"
            >
              <i data-lucide="bot" style="width: 13px; height: 13px"></i> AI
            </button>
            <button
              class="btn"
              data-f="checkpoint"
              onclick="sf('checkpoint', this)"
            >
              <i data-lucide="activity" style="width: 13px; height: 13px"></i>
              检查点
            </button>
          </div>
          <button class="btn" id="ttkb" onclick="tap('tk')">
            <i data-lucide="brain" style="width: 13px; height: 13px"></i> 推理
          </button>
          <button class="btn" id="ttlb" onclick="tap('tl')">
            <i data-lucide="wrench" style="width: 13px; height: 13px"></i> 工具
          </button>
        </div>
        <div class="tl" id="tl"></div>
      </div>
      <footer>
        AGP Conversation Viewer by <a href="#">AG Pulse</a> · Markdown via
        <a href="https://marked.js.org/" target="_blank">marked.js</a>
      </footer>
    </div>
    <script>
      let D = null,
        CF = "all",
        PS = { tk: false, tl: false };
      const PR = {
        MODEL_PLACEHOLDER_M26: {
          n: "Claude Opus 4.6",
          i: 5,
          o: 25,
          cw: 6.25,
          cr: 0.5,
        },
        MODEL_PLACEHOLDER_M35: {
          n: "Claude Sonnet 4.6",
          i: 3,
          o: 15,
          cw: 3.75,
          cr: 0.3,
        },
        MODEL_PLACEHOLDER_M37: {
          n: "Gemini 3.1 Pro",
          i: 1.25,
          o: 10,
          cw: 1.5625,
          cr: 0.3125,
        },
        MODEL_PLACEHOLDER_M36: {
          n: "Gemini 3.1 Pro",
          i: 1.25,
          o: 10,
          cw: 1.5625,
          cr: 0.3125,
        },
        MODEL_PLACEHOLDER_M18: {
          n: "Gemini Flash",
          i: 0.15,
          o: 0.6,
          cw: 0.19,
          cr: 0.04,
        },
        MODEL_PLACEHOLDER_M47: {
          n: "Gemini Flash",
          i: 0.15,
          o: 0.6,
          cw: 0.19,
          cr: 0.04,
        },
        MODEL_GOOGLE_GEMINI_2_5_FLASH_LITE: {
          n: "Flash Lite",
          i: 0.075,
          o: 0.3,
          cw: 0.01,
          cr: 0.01,
        },
        DEFAULT: { n: "Unknown", i: 1.25, o: 10, cw: 1.56, cr: 0.31 },
      };
      function gp(m) {
        return PR[m] || PR.DEFAULT;
      }
      function et(t) {
        if (!t) return 0;
        let a = 0,
          n = 0;
        for (let i = 0; i < t.length; i++) t.charCodeAt(i) < 128 ? a++ : n++;
        return Math.ceil(a / 4 + n / 1.5);
      }
      function cc(d) {
        const p = gp(d.model),
          B = 1500;
        let ctx = B,
          psi = 0,
          fs = true,
          pc = false,
          pci = -1,
          tu = 0,
          tc = 0;
        for (const m of d.messages || []) {
          if (m.type === "checkpoint") {
            const ci = m.tokens?.input || 0;
            if (ci > 0) {
              if (pci > 0 && ci < pci && pci - ci > 5000) {
                ctx = ci;
                pc = true;
              } else {
                ctx = Math.max(ctx, ci);
              }
              pci = ci;
            }
            continue;
          }
          if (m.type === "user") {
            ctx += et(m.content);
          } else if (m.type === "assistant") {
            let o = et(m.content || "");
            if (m.toolCalls)
              for (const t of m.toolCalls)
                o += et((t.name || "") + (t.args || ""));
            if (m.thinking) o += et(m.thinking);
            const oc = (o / 1e6) * p.o,
              ui = (ctx / 1e6) * p.i;
            let ci;
            if (fs || pc) {
              ci = (ctx / 1e6) * p.cw;
            } else {
              ci =
                (Math.max(0, psi) / 1e6) * p.cr +
                (Math.max(0, ctx - psi) / 1e6) * p.cw;
            }
            tu += ui + oc;
            tc += ci + oc;
            psi = ctx;
            fs = false;
            if (pc) pc = false;
            ctx += o;
          }
        }
        return { tu, tc, ae: d.usage?.estimatedCost || 0 };
      }
      function f$(n) {
        return n < 0.01 && n > 0 ? "<$0.01" : "$" + n.toFixed(2);
      }
      function fK(n) {
        return n >= 1e6
          ? (n / 1e6).toFixed(1) + "M"
          : n >= 1e3
            ? (n / 1e3).toFixed(1) + "k"
            : String(Math.round(n));
      }
      function eH(s) {
        const d = document.createElement("div");
        d.textContent = s || "";
        return d.innerHTML;
      }
      function eA(s) {
        return (s || "")
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .slice(0, 500);
      }
      function fT(iso) {
        if (!iso) return "—";
        try {
          return new Date(iso).toLocaleString("zh-CN", {
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
          });
        } catch {
          return iso;
        }
      }
      function rM(t) {
        if (!t) return "";
        try {
          marked.setOptions({
            breaks: true,
            gfm: true,
            highlight: (c, l) => {
              if (l && hljs.getLanguage(l))
                return hljs.highlight(c, { language: l }).value;
              return hljs.highlightAuto(c).value;
            },
          });
          return marked.parse(t);
        } catch {
          return "<p>" + eH(t).replace(/\n/g, "<br>") + "</p>";
        }
      }
      function gN(m) {
        const p = PR[m];
        return p
          ? p.n
          : m?.replace(/^MODEL_/, "").replace(/_/g, " ") || "Unknown";
      }
      function lci(name, size) {
        return `<i data-lucide="${name}" style="width:${size}px;height:${size}px"></i>`;
      }

      function rv(data) {
        D = data;
        document.getElementById("vw").style.display = "block";
        document.getElementById("dz").style.display = "none";
        const c = cc(data),
          u = data.usage || {},
          ms = data.messages || [];
        const um = ms.filter((m) => m.type === "user").length,
          am = ms.filter((m) => m.type === "assistant").length,
          cp = ms.filter((m) => m.type === "checkpoint").length;
        let dur = "—";
        if (data.createdTime && data.lastModifiedTime) {
          const mn = Math.round(
            (new Date(data.lastModifiedTime) - new Date(data.createdTime)) /
              60000,
          );
          dur =
            mn >= 60 ? Math.floor(mn / 60) + "h " + (mn % 60) + "m" : mn + "m";
        }
        document.getElementById("mp").innerHTML =
          `<h2>${eH(data.title || data.cascadeId || "Untitled")}</h2>
<div class="sub">${lci("cpu", 14)} ${eH(data.modelDisplayName || gN(data.model))} · ${fT(data.createdTime)} → ${fT(data.lastModifiedTime)} · ${dur}</div>
<div class="mg">
<div class="mi"><div class="l">对话轮次</div><div class="v">${um}</div></div>
<div class="mi"><div class="l">AI 回复</div><div class="v">${am}</div></div>
<div class="mi"><div class="l">检查点</div><div class="v">${cp}</div></div>
<div class="mi"><div class="l">总步骤</div><div class="v">${data.stepCount || ms.length}</div></div>
<div class="mi"><div class="l">上下文</div><div class="v">${fK(u.contextUsed || u.totalInputTokens || 0)}</div></div>
<div class="mi"><div class="l">压缩</div><div class="v" style="color:${u.compressionDetected ? "var(--amber)" : "var(--tx3)"}">${u.compressionDetected ? "检测到" : "无"}</div></div>
</div>`;
        document.getElementById("cro").innerHTML = `
<div class="cc un"><div class="cl">${lci("zap", 13)} 无缓存 API</div><div class="cv">${f$(c.tu)}</div><div class="cs">中转站 / 随机轮询</div></div>
<div class="cc ca"><div class="cl">${lci("database", 13)} 有缓存 API</div><div class="cv">${f$(c.tc)}</div><div class="cs">官方 API + Cache</div></div>
<div class="cc ag"><div class="cl">${lci("gauge", 13)} AGP 估算</div><div class="cv">${f$(c.ae)}</div><div class="cs">Checkpoint 快照</div></div>`;
        rt(ms);
        lucide.createIcons();
      }
      function rt(ms) {
        const tl = document.getElementById("tl");
        let h = "";
        for (let i = 0; i < ms.length; i++) {
          const m = ms[i];
          if (m.type === "checkpoint") h += rCp(m, i);
          else if (m.type === "user") h += rU(m, i);
          else if (m.type === "assistant") h += rA(m, i);
        }
        tl.innerHTML = h;
        lucide.createIcons();
        tl.querySelectorAll("pre code").forEach((el) => {
          try {
            hljs.highlightElement(el);
          } catch {}
        });
      }
      function rCp(m, i) {
        const t = m.tokens || {};
        return `<div class="mc cpk" data-type="checkpoint" data-idx="${i}"><div class="cpi">
<span class="cpl">${lci("activity", 13)} Checkpoint</span>
<span class="cps">In: <span>${fK(t.input || 0)}</span></span>
<span class="cps">Out: <span>${fK(t.output || 0)}</span></span>
${t.cacheRead ? `<span class="cps">Cache: <span>${fK(t.cacheRead)}</span></span>` : ""}
<span class="ms">step ${m.stepIndex}</span>
</div></div>`;
      }
      function rU(m, i) {
        const c = m.content || "",
          tr = c.length > 2000,
          dc = tr ? c.slice(0, 2000) + "\n\n…" : c;
        return `<div class="mc usr" data-type="user" data-idx="${i}" data-text="${eA(c)}">
<div class="mh"><span class="mr">${lci("user", 14)} 用户</span><span class="ms">step ${m.stepIndex}</span></div>
<div class="${tr ? "trunc" : ""}" id="w${i}"><div class="mct">${rM(dc)}</div></div>
${tr ? `<button class="xb" onclick="xc(${i})">展开完整内容 (${c.length} 字符)</button>` : ""}</div>`;
      }
      function rA(m, i) {
        const c = m.content || "",
          tr = c.length > 3000,
          dc = tr ? c.slice(0, 3000) + "\n\n…" : c;
        const ht = !!m.thinking,
          htl = m.toolCalls && m.toolCalls.length > 0;
        let pn = "";
        if (ht)
          pn += `<div class="pn tk"><div class="ph" onclick="tp(this)">${lci("brain", 14)} AI 推理过程 <span style="color:var(--tx3);font-weight:400;font-size:0.7rem">(${m.thinking.length} 字符)</span><span class="ar">${lci("chevron-down", 14)}</span></div><div class="pb thinking-panel">${eH(m.thinking)}</div></div>`;
        if (htl) {
          let th = "";
          for (const tc of m.toolCalls) {
            let a = tc.args || "";
            try {
              a = JSON.stringify(JSON.parse(a), null, 2);
            } catch {}
            th += `<div class="tc"><div class="tn">${lci("wrench", 12)} ${eH(tc.name)}</div><div class="ta">${eH(a)}</div></div>`;
          }
          pn += `<div class="pn tl"><div class="ph" onclick="tp(this)">${lci("wrench", 14)} 工具调用 <span style="color:var(--tx3);font-weight:400;font-size:0.7rem">(${m.toolCalls.length} 个)</span><span class="ar">${lci("chevron-down", 14)}</span></div><div class="pb tool-panel">${th}</div></div>`;
        }
        const mt = m.model ? `<span class="mt">${gN(m.model)}</span>` : "";
        return `<div class="mc ast" data-type="assistant" data-idx="${i}" data-text="${eA(c + (m.thinking || ""))}">
<div class="mh"><span class="mr">${lci("bot", 14)} AI</span><span class="ms">step ${m.stepIndex}</span>${mt}
${ht ? `<span class="mbi" style="color:var(--amber)">${lci("brain", 12)}</span>` : ""}
${htl ? `<span class="mbi" style="color:var(--blue)">${lci("wrench", 12)}×${m.toolCalls.length}</span>` : ""}</div>
${c ? `<div class="${tr ? "trunc" : ""}" id="w${i}"><div class="mct">${rM(dc)}</div></div>${tr ? `<button class="xb" onclick="xc(${i})">展开完整内容 (${c.length} 字符)</button>` : ""}` : ""} 
${pn}</div>`;
      }

      function xc(i) {
        const m = D.messages[i],
          w = document.getElementById("w" + i);
        if (!w) return;
        w.classList.remove("trunc");
        w.querySelector(".mct").innerHTML = rM(m.content);
        w.querySelectorAll("pre code").forEach((el) => {
          try {
            hljs.highlightElement(el);
          } catch {}
        });
        lucide.createIcons();
        const b = w.parentElement.querySelector(".xb");
        if (b) b.remove();
      }
      function tp(h) {
        h.classList.toggle("op");
        h.nextElementSibling.classList.toggle("op");
        lucide.createIcons();
      }
      function tap(t) {
        PS[t] = !PS[t];
        document.querySelectorAll(`.pn.${t}`).forEach((p) => {
          const h = p.querySelector(".ph"),
            b = p.querySelector(".pb");
          PS[t]
            ? (h.classList.add("op"), b.classList.add("op"))
            : (h.classList.remove("op"), b.classList.remove("op"));
        });
        lucide.createIcons();
        const btn =
          t === "tk"
            ? document.getElementById("ttkb")
            : document.getElementById("ttlb");
        btn.classList.toggle("act", PS[t]);
      }
      function sf(f, b) {
        CF = f;
        document
          .querySelectorAll(".fg .btn")
          .forEach((x) => x.classList.remove("act"));
        b.classList.add("act");
        document.querySelectorAll(".mc").forEach((c) => {
          c.classList.toggle("fo", f !== "all" && c.dataset.type !== f);
        });
      }
      let sto = null;
      document.getElementById("sb").addEventListener("input", function () {
        clearTimeout(sto);
        sto = setTimeout(() => ps(this.value), 200);
      });
      function ps(q) {
        const cs = document.querySelectorAll(".mc"),
          ce = document.getElementById("scc");
        if (!q || q.length < 2) {
          cs.forEach((c) => c.classList.remove("sm", "sh"));
          ce.textContent = "";
          return;
        }
        const lq = q.toLowerCase();
        let h = 0;
        cs.forEach((c) => {
          const t = c.dataset.text || c.textContent || "";
          t.toLowerCase().includes(lq)
            ? (c.classList.add("sh"), c.classList.remove("sm"), h++)
            : (c.classList.add("sm"), c.classList.remove("sh"));
        });
        ce.textContent = h + " 条匹配";
      }
      // Theme
      const ttb = document.getElementById("tt");
      function uti() {
        const t = document.documentElement.getAttribute("data-theme");
        ttb.innerHTML = t === "dark" ? lci("sun", 18) : lci("moon", 18);
        lucide.createIcons();
      }
      uti();
      ttb.addEventListener("click", () => {
        const c = document.documentElement.getAttribute("data-theme"),
          n = c === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", n);
        localStorage.setItem("agp-vt", n);
        uti();
      });
      // File
      const dz = document.getElementById("dz"),
        fi = document.getElementById("fi");
      dz.addEventListener("click", () => fi.click());
      dz.addEventListener("dragover", (e) => {
        e.preventDefault();
        dz.classList.add("over");
      });
      dz.addEventListener("dragleave", () => dz.classList.remove("over"));
      dz.addEventListener("drop", (e) => {
        e.preventDefault();
        dz.classList.remove("over");
        hf(e.dataTransfer.files[0]);
      });
      fi.addEventListener("change", (e) => hf(e.target.files[0]));
      async function hf(f) {
        if (!f) return;
        try {
          const t = await f.text(),
            d = JSON.parse(t);
          if (!d.messages) {
            alert("无效的 AGP 导出文件");
            return;
          }
          rv(d);
        } catch (e) {
          alert("解析失败：" + e.message);
        }
      }
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && D) {
          document.getElementById("vw").style.display = "none";
          document.getElementById("dz").style.display = "";
          D = null;
        }
      });
      // Init icons
      lucide.createIcons();
    </script>
  </body>
</html>
