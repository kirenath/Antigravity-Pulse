<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AGP Conversation Viewer — 对话可视化</title>
    <meta
      name="description"
      content="可视化 AGP 导出的对话 JSON 文件，查看完整对话内容、AI 推理过程、工具调用和 Token 统计。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css"
      id="hljs-dark"
    />
    <style>
      /* ═══ Design Tokens ═══ */
      :root {
        --radius: 16px;
        --radius-sm: 10px;
        --radius-xs: 6px;
        --transition: 0.25s cubic-bezier(0.22, 1, 0.36, 1);
      }

      [data-theme="dark"] {
        --bg-primary: #0a0a0f;
        --bg-secondary: #12121a;
        --bg-card: #1a1a26;
        --bg-card-hover: #22223a;
        --bg-user: #1e1b4b;
        --bg-user-border: #4f46e5;
        --bg-assistant: #1a1a26;
        --bg-assistant-border: #374151;
        --bg-thinking: #1c1917;
        --bg-thinking-border: #78716c;
        --bg-tool: #0c1222;
        --bg-tool-border: #1e40af;
        --bg-checkpoint: rgba(245, 158, 11, 0.08);
        --bg-checkpoint-border: rgba(245, 158, 11, 0.3);
        --border: #2a2a3e;
        --border-glow: #6366f1;
        --text-primary: #e8e8ef;
        --text-secondary: #9899ac;
        --text-dim: #666680;
        --text-on-user: #c7d2fe;
        --accent-purple: #8b5cf6;
        --accent-blue: #3b82f6;
        --accent-cyan: #06b6d4;
        --accent-green: #10b981;
        --accent-amber: #f59e0b;
        --accent-red: #ef4444;
        --accent-pink: #ec4899;
        --gradient-hero: linear-gradient(
          135deg,
          #6366f1 0%,
          #8b5cf6 30%,
          #ec4899 100%
        );
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
        --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.12);
        --ambient-1: rgba(99, 102, 241, 0.05);
        --ambient-2: rgba(236, 72, 153, 0.03);
        --bar-track: rgba(255, 255, 255, 0.04);
        --code-bg: #0d1117;
        --search-highlight: rgba(250, 204, 21, 0.3);
      }

      [data-theme="light"] {
        --bg-primary: #f8f8fb;
        --bg-secondary: #eeeef2;
        --bg-card: #ffffff;
        --bg-card-hover: #f3f3f8;
        --bg-user: #eef2ff;
        --bg-user-border: #818cf8;
        --bg-assistant: #ffffff;
        --bg-assistant-border: #d1d5db;
        --bg-thinking: #fefce8;
        --bg-thinking-border: #d97706;
        --bg-tool: #eff6ff;
        --bg-tool-border: #3b82f6;
        --bg-checkpoint: rgba(245, 158, 11, 0.06);
        --bg-checkpoint-border: rgba(245, 158, 11, 0.35);
        --border: #d8d8e0;
        --border-glow: #6366f1;
        --text-primary: #1a1a2e;
        --text-secondary: #5c5c72;
        --text-dim: #9898aa;
        --text-on-user: #3730a3;
        --accent-purple: #7c3aed;
        --accent-blue: #2563eb;
        --accent-cyan: #0891b2;
        --accent-green: #059669;
        --accent-amber: #d97706;
        --accent-red: #dc2626;
        --accent-pink: #db2777;
        --gradient-hero: linear-gradient(
          135deg,
          #4f46e5 0%,
          #7c3aed 30%,
          #db2777 100%
        );
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.06);
        --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.08);
        --ambient-1: rgba(99, 102, 241, 0.03);
        --ambient-2: rgba(236, 72, 153, 0.02);
        --bar-track: rgba(0, 0, 0, 0.05);
        --code-bg: #f6f8fa;
        --search-highlight: rgba(250, 204, 21, 0.5);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            circle at 20% 10%,
            var(--ambient-1) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 90%,
            var(--ambient-2) 0%,
            transparent 50%
          );
        pointer-events: none;
        z-index: 0;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 32px 20px;
        position: relative;
        z-index: 1;
      }

      /* ═══ Header ═══ */
      .app-header {
        text-align: center;
        margin-bottom: 36px;
      }
      .app-header h1 {
        font-size: 2.2rem;
        font-weight: 800;
        background: var(--gradient-hero);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.3;
        margin-bottom: 8px;
      }
      .app-header h1 .emoji {
        -webkit-text-fill-color: initial;
      }
      .app-header p {
        color: var(--text-secondary);
        font-size: 0.95rem;
        max-width: 580px;
        margin: 0 auto;
        line-height: 1.6;
      }
      .app-header .badge {
        display: inline-block;
        margin-top: 12px;
        padding: 4px 14px;
        background: rgba(99, 102, 241, 0.1);
        border: 1px solid rgba(99, 102, 241, 0.22);
        border-radius: 20px;
        font-size: 0.76rem;
        color: var(--accent-purple);
        font-weight: 500;
      }

      /* ═══ Dropzone ═══ */
      .dropzone {
        border: 2px dashed var(--border);
        border-radius: var(--radius);
        padding: 56px 28px;
        text-align: center;
        cursor: pointer;
        transition: all var(--transition);
        background: var(--bg-secondary);
        position: relative;
      }
      .dropzone:hover,
      .dropzone.drag-over {
        border-color: var(--border-glow);
        background: var(--bg-card);
        box-shadow: var(--shadow-glow);
      }
      .dropzone.drag-over {
        transform: scale(1.005);
      }
      .dropzone-icon {
        font-size: 3rem;
        margin-bottom: 12px;
        display: block;
      }
      .dropzone h3 {
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .dropzone p {
        color: var(--text-secondary);
        font-size: 0.88rem;
      }
      .dropzone .hint {
        margin-top: 14px;
        font-size: 0.75rem;
        color: var(--text-dim);
      }
      #fileInput {
        display: none;
      }

      /* ═══ Theme Toggle ═══ */
      .theme-toggle {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 200;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: var(--bg-card);
        font-size: 1.1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition);
        box-shadow: var(--shadow-lg);
      }
      .theme-toggle:hover {
        border-color: var(--border-glow);
        transform: scale(1.1);
      }

      /* ═══ Viewer Content ═══ */
      #viewer {
        display: none;
      }

      /* ── Meta Panel ── */
      .meta-panel {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
        margin-bottom: 20px;
      }
      .meta-panel h2 {
        font-size: 1.3rem;
        font-weight: 700;
        margin-bottom: 4px;
        word-break: break-word;
      }
      .meta-panel .subtitle {
        color: var(--text-secondary);
        font-size: 0.82rem;
        margin-bottom: 16px;
      }
      .meta-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
      }
      .meta-item {
        background: var(--bg-secondary);
        border-radius: var(--radius-sm);
        padding: 12px 14px;
      }
      .meta-item .lbl {
        font-size: 0.68rem;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 3px;
      }
      .meta-item .val {
        font-size: 1rem;
        font-weight: 700;
        font-family: "JetBrains Mono", monospace;
      }

      /* ── Cost Row ── */
      .cost-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 20px;
      }
      @media (max-width: 600px) {
        .cost-row {
          grid-template-columns: 1fr;
        }
      }
      .cost-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      .cost-card::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
      }
      .cost-card.uncached::after {
        background: linear-gradient(135deg, #ef4444, #f97316);
      }
      .cost-card.cached::after {
        background: linear-gradient(135deg, #3b82f6, #06b6d4);
      }
      .cost-card.agp::after {
        background: linear-gradient(135deg, #10b981, #34d399);
      }
      .cost-card .clabel {
        font-size: 0.72rem;
        color: var(--text-secondary);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        margin-bottom: 6px;
      }
      .cost-card .cprice {
        font-size: 1.6rem;
        font-weight: 800;
        font-family: "JetBrains Mono", monospace;
      }
      .cost-card.uncached .cprice {
        color: var(--accent-red);
      }
      .cost-card.cached .cprice {
        color: var(--accent-blue);
      }
      .cost-card.agp .cprice {
        color: var(--accent-green);
      }
      .cost-card .csub {
        font-size: 0.7rem;
        color: var(--text-dim);
        margin-top: 4px;
      }

      /* ── Toolbar ── */
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin-bottom: 20px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 16px;
      }
      .toolbar .search-box {
        flex: 1;
        min-width: 200px;
        padding: 8px 14px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: var(--bg-secondary);
        color: var(--text-primary);
        font-size: 0.85rem;
        font-family: inherit;
        outline: none;
        transition: border-color var(--transition);
      }
      .toolbar .search-box:focus {
        border-color: var(--border-glow);
      }
      .toolbar .search-box::placeholder {
        color: var(--text-dim);
      }
      .toolbar .btn {
        padding: 7px 14px;
        border-radius: var(--radius-xs);
        border: 1px solid var(--border);
        background: var(--bg-secondary);
        color: var(--text-secondary);
        font-size: 0.78rem;
        font-family: inherit;
        font-weight: 500;
        cursor: pointer;
        transition: all var(--transition);
        white-space: nowrap;
      }
      .toolbar .btn:hover {
        border-color: var(--border-glow);
        color: var(--text-primary);
      }
      .toolbar .btn.active {
        background: var(--accent-purple);
        color: #fff;
        border-color: var(--accent-purple);
      }
      .filter-group {
        display: flex;
        gap: 4px;
      }
      .search-count {
        font-size: 0.75rem;
        color: var(--text-dim);
        font-family: "JetBrains Mono", monospace;
      }

      /* ═══ Message Timeline ═══ */
      .timeline {
        position: relative;
      }

      .msg-card {
        border-radius: var(--radius);
        padding: 16px 20px;
        margin-bottom: 12px;
        position: relative;
        border: 1px solid;
        transition: opacity var(--transition);
        word-wrap: break-word;
        overflow-wrap: break-word;
      }
      .msg-card.filtered-out {
        display: none;
      }
      .msg-card.search-miss {
        opacity: 0.2;
      }
      .msg-card.search-hit {
        opacity: 1;
      }

      /* ── User ── */
      .msg-card.user {
        background: var(--bg-user);
        border-color: var(--bg-user-border);
        margin-right: 48px;
      }
      .msg-card.user .msg-role {
        color: var(--accent-purple);
      }

      /* ── Assistant ── */
      .msg-card.assistant {
        background: var(--bg-assistant);
        border-color: var(--bg-assistant-border);
        margin-left: 48px;
      }
      .msg-card.assistant .msg-role {
        color: var(--accent-cyan);
      }

      /* ── Checkpoint ── */
      .msg-card.checkpoint {
        background: var(--bg-checkpoint);
        border-color: var(--bg-checkpoint-border);
        padding: 10px 18px;
        text-align: center;
        max-width: 700px;
        margin: 16px auto;
      }

      /* ── Role header ── */
      .msg-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }
      .msg-role {
        font-weight: 700;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.6px;
      }
      .msg-step {
        font-size: 0.68rem;
        color: var(--text-dim);
        font-family: "JetBrains Mono", monospace;
      }
      .msg-model-tag {
        font-size: 0.65rem;
        padding: 2px 8px;
        border-radius: 10px;
        background: rgba(99, 102, 241, 0.1);
        color: var(--accent-purple);
        font-weight: 500;
      }

      /* ── Content ── */
      .msg-content {
        font-size: 0.9rem;
        line-height: 1.7;
        color: var(--text-primary);
      }
      .msg-content p {
        margin-bottom: 0.8em;
      }
      .msg-content p:last-child {
        margin-bottom: 0;
      }
      .msg-content h1,
      .msg-content h2,
      .msg-content h3,
      .msg-content h4 {
        margin-top: 1em;
        margin-bottom: 0.5em;
        font-weight: 700;
      }
      .msg-content h2 {
        font-size: 1.15rem;
      }
      .msg-content h3 {
        font-size: 1.05rem;
      }
      .msg-content ul,
      .msg-content ol {
        padding-left: 1.5em;
        margin-bottom: 0.8em;
      }
      .msg-content li {
        margin-bottom: 0.3em;
      }
      .msg-content code {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.82em;
        padding: 2px 6px;
        border-radius: 4px;
        background: var(--code-bg);
      }
      .msg-content pre {
        border-radius: var(--radius-xs);
        padding: 14px;
        margin: 0.8em 0;
        overflow-x: auto;
        background: var(--code-bg) !important;
        font-size: 0.8rem;
        line-height: 1.5;
      }
      .msg-content pre code {
        padding: 0;
        background: transparent;
        font-size: inherit;
      }
      .msg-content table {
        width: 100%;
        border-collapse: collapse;
        margin: 0.8em 0;
        font-size: 0.85rem;
      }
      .msg-content th,
      .msg-content td {
        border: 1px solid var(--border);
        padding: 7px 10px;
        text-align: left;
      }
      .msg-content th {
        background: var(--bg-secondary);
        font-weight: 600;
        font-size: 0.8rem;
      }
      .msg-content blockquote {
        border-left: 3px solid var(--accent-purple);
        padding: 8px 16px;
        margin: 0.8em 0;
        background: var(--bg-secondary);
        border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
        color: var(--text-secondary);
      }
      .msg-content a {
        color: var(--accent-blue);
        text-decoration: none;
      }
      .msg-content a:hover {
        text-decoration: underline;
      }
      .msg-content img {
        max-width: 100%;
        border-radius: var(--radius-xs);
      }
      .msg-content strong {
        font-weight: 600;
      }

      /* ── Truncation ── */
      .content-truncated {
        position: relative;
      }
      .content-truncated .msg-content {
        max-height: 400px;
        overflow: hidden;
      }
      .content-truncated .msg-content::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 60px;
        background: linear-gradient(transparent, var(--bg-assistant));
        pointer-events: none;
      }
      .msg-card.user .content-truncated .msg-content::after {
        background: linear-gradient(transparent, var(--bg-user));
      }
      .expand-btn {
        display: block;
        width: 100%;
        margin-top: 4px;
        padding: 6px;
        background: transparent;
        border: 1px dashed var(--border);
        border-radius: var(--radius-xs);
        color: var(--accent-purple);
        font-size: 0.78rem;
        font-family: inherit;
        cursor: pointer;
        transition: all var(--transition);
      }
      .expand-btn:hover {
        background: var(--bg-secondary);
      }

      /* ═══ Collapsible Panels ═══ */
      .panel {
        margin-top: 10px;
        border: 1px solid;
        border-radius: var(--radius-sm);
        overflow: hidden;
      }
      .panel-header {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        cursor: pointer;
        font-size: 0.78rem;
        font-weight: 600;
        transition: background var(--transition);
        user-select: none;
      }
      .panel-header:hover {
        filter: brightness(1.1);
      }
      .panel-header .arrow {
        font-size: 0.65rem;
        transition: transform var(--transition);
        margin-left: auto;
        color: var(--text-dim);
      }
      .panel-header.open .arrow {
        transform: rotate(180deg);
      }
      .panel-body {
        display: none;
        padding: 12px 14px;
        font-size: 0.84rem;
        line-height: 1.6;
        max-height: 500px;
        overflow-y: auto;
      }
      .panel-body.open {
        display: block;
      }

      /* Thinking panel */
      .panel.thinking {
        border-color: var(--bg-thinking-border);
      }
      .panel.thinking .panel-header {
        background: var(--bg-thinking);
        color: var(--accent-amber);
      }
      .panel.thinking .panel-body {
        background: var(--bg-thinking);
        color: var(--text-secondary);
        font-style: italic;
        white-space: pre-wrap;
      }

      /* Tool panel */
      .panel.tool {
        border-color: var(--bg-tool-border);
      }
      .panel.tool .panel-header {
        background: var(--bg-tool);
        color: var(--accent-blue);
      }
      .panel.tool .panel-body {
        background: var(--bg-tool);
      }
      .tool-call {
        margin-bottom: 10px;
        padding: 8px 10px;
        background: var(--bg-secondary);
        border-radius: var(--radius-xs);
        font-family: "JetBrains Mono", monospace;
        font-size: 0.76rem;
        line-height: 1.5;
      }
      .tool-call:last-child {
        margin-bottom: 0;
      }
      .tool-call .tool-name {
        font-weight: 700;
        color: var(--accent-blue);
        margin-bottom: 4px;
      }
      .tool-call .tool-args {
        color: var(--text-secondary);
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 200px;
        overflow-y: auto;
      }

      /* ── Checkpoint  ── */
      .checkpoint-info {
        display: flex;
        gap: 20px;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        font-size: 0.78rem;
        color: var(--text-secondary);
        font-family: "JetBrains Mono", monospace;
      }
      .checkpoint-info .cp-label {
        font-weight: 700;
        color: var(--accent-amber);
        font-family: "Inter", sans-serif;
        text-transform: uppercase;
        font-size: 0.68rem;
        letter-spacing: 0.8px;
      }
      .checkpoint-info .cp-stat span {
        font-weight: 600;
        color: var(--text-primary);
      }

      /* ── Search highlight ── */
      mark.search-hl {
        background: var(--search-highlight);
        color: inherit;
        padding: 1px 2px;
        border-radius: 2px;
      }

      /* ── Footer ── */
      footer {
        text-align: center;
        margin-top: 40px;
        padding: 20px;
        color: var(--text-dim);
        font-size: 0.75rem;
        line-height: 1.7;
      }
      footer a {
        color: var(--accent-purple);
        text-decoration: none;
      }
      footer a:hover {
        text-decoration: underline;
      }

      /* ═══ Responsive ═══ */
      @media (max-width: 640px) {
        .msg-card.user {
          margin-right: 16px;
        }
        .msg-card.assistant {
          margin-left: 16px;
        }
        .container {
          padding: 16px 12px;
        }
        .app-header h1 {
          font-size: 1.6rem;
        }
      }
    </style>
    <script>
      (function () {
        const saved = localStorage.getItem("agp-viewer-theme");
        const prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;
        document.documentElement.setAttribute(
          "data-theme",
          saved || (prefersDark ? "dark" : "light"),
        );
      })();
    </script>
  </head>
  <body>
    <button class="theme-toggle" id="themeToggle" title="切换亮色/暗色模式">
      🌙
    </button>
    <div class="container">
      <header class="app-header">
        <h1><span class="emoji">💬</span> AGP Conversation Viewer</h1>
        <p>
          上传 AGP 导出的对话 JSON，可视化完整对话内容。<br />查看 AI
          推理过程、工具调用、Token 统计和成本分析。
        </p>
        <span class="badge">🔒 完全本地解析 · 不上传任何数据</span>
      </header>

      <div class="dropzone" id="dropzone">
        <span class="dropzone-icon">📂</span>
        <h3>拖放 JSON 文件到这里</h3>
        <p>或点击选择 AGP 对话导出文件</p>
        <p class="hint">支持 AGP ConversationExport JSON 格式</p>
        <input type="file" id="fileInput" accept=".json" />
      </div>

      <div id="viewer">
        <div id="metaPanel" class="meta-panel"></div>
        <div id="costRow" class="cost-row"></div>
        <div class="toolbar" id="toolbar">
          <input
            class="search-box"
            id="searchBox"
            type="text"
            placeholder="🔍 搜索对话内容…"
          />
          <span class="search-count" id="searchCount"></span>
          <div class="filter-group">
            <button
              class="btn active"
              data-filter="all"
              onclick="setFilter('all', this)"
            >
              全部
            </button>
            <button
              class="btn"
              data-filter="user"
              onclick="setFilter('user', this)"
            >
              👤 用户
            </button>
            <button
              class="btn"
              data-filter="assistant"
              onclick="setFilter('assistant', this)"
            >
              🤖 AI
            </button>
            <button
              class="btn"
              data-filter="checkpoint"
              onclick="setFilter('checkpoint', this)"
            >
              📊 检查点
            </button>
          </div>
          <button
            class="btn"
            id="toggleThinkingBtn"
            onclick="toggleAllPanels('thinking')"
          >
            🧠 展开推理
          </button>
          <button
            class="btn"
            id="toggleToolsBtn"
            onclick="toggleAllPanels('tool')"
          >
            🔧 展开工具
          </button>
        </div>
        <div class="timeline" id="timeline"></div>
      </div>

      <footer>
        <p>
          AGP Conversation Viewer by <a href="#">AG Pulse</a><br />
          完全本地解析 · Markdown 渲染 via
          <a href="https://marked.js.org/" target="_blank">marked.js</a> +
          <a href="https://highlightjs.org/" target="_blank">highlight.js</a>
        </p>
      </footer>
    </div>

    <script>
      // ═══ Globals ═══
      let currentData = null;
      let currentFilter = "all";
      let allPanelStates = { thinking: false, tool: false };

      // ═══ Pricing (from cost-calculator) ═══
      const PRICING = {
        MODEL_PLACEHOLDER_M26: {
          name: "Claude Opus 4.6",
          in: 5.0,
          out: 25.0,
          cacheWrite: 6.25,
          cacheRead: 0.5,
        },
        MODEL_PLACEHOLDER_M35: {
          name: "Claude Sonnet 4.6",
          in: 3.0,
          out: 15.0,
          cacheWrite: 3.75,
          cacheRead: 0.3,
        },
        MODEL_PLACEHOLDER_M37: {
          name: "Gemini 3.1 Pro (H)",
          in: 1.25,
          out: 10.0,
          cacheWrite: 1.5625,
          cacheRead: 0.3125,
        },
        MODEL_PLACEHOLDER_M36: {
          name: "Gemini 3.1 Pro (L)",
          in: 1.25,
          out: 10.0,
          cacheWrite: 1.5625,
          cacheRead: 0.3125,
        },
        MODEL_PLACEHOLDER_M18: {
          name: "Gemini 3 Flash",
          in: 0.15,
          out: 0.6,
          cacheWrite: 0.1875,
          cacheRead: 0.0375,
        },
        MODEL_PLACEHOLDER_M47: {
          name: "Gemini 3 Flash",
          in: 0.15,
          out: 0.6,
          cacheWrite: 0.1875,
          cacheRead: 0.0375,
        },
        MODEL_GOOGLE_GEMINI_2_5_FLASH_LITE: {
          name: "Gemini Flash Lite",
          in: 0.075,
          out: 0.3,
          cacheWrite: 0.01,
          cacheRead: 0.01,
        },
        MODEL_OPENAI_GPT_OSS_120B_MEDIUM: {
          name: "GPT-OSS 120B",
          in: 1.25,
          out: 10.0,
          cacheWrite: 1.25,
          cacheRead: 0.625,
        },
        DEFAULT: {
          name: "Unknown",
          in: 1.25,
          out: 10.0,
          cacheWrite: 1.5625,
          cacheRead: 0.3125,
        },
      };
      function getPricing(m) {
        return PRICING[m] || PRICING.DEFAULT;
      }
      function estimateTokens(t) {
        if (!t) return 0;
        let a = 0,
          n = 0;
        for (let i = 0; i < t.length; i++) t.charCodeAt(i) < 128 ? a++ : n++;
        return Math.ceil(a / 4 + n / 1.5);
      }

      // ═══ Cost Calculation (simplified from cost-calculator) ═══
      function calcCosts(data) {
        const pricing = getPricing(data.model);
        const BASE = 1500;
        let ctx = BASE,
          prevSubIn = 0,
          firstSub = true,
          postComp = false;
        let prevCpIn = -1;
        let totalUncached = 0,
          totalCached = 0;

        for (const msg of data.messages || []) {
          if (msg.type === "checkpoint") {
            const cpIn = msg.tokens?.input || 0;
            if (cpIn > 0) {
              if (prevCpIn > 0 && cpIn < prevCpIn && prevCpIn - cpIn > 5000) {
                ctx = cpIn;
                postComp = true;
              } else {
                ctx = Math.max(ctx, cpIn);
              }
              prevCpIn = cpIn;
            }
            continue;
          }
          if (msg.type === "user") {
            ctx += estimateTokens(msg.content);
          } else if (msg.type === "assistant") {
            let out = estimateTokens(msg.content || "");
            if (msg.toolCalls)
              for (const tc of msg.toolCalls)
                out += estimateTokens((tc.name || "") + (tc.args || ""));
            if (msg.thinking) out += estimateTokens(msg.thinking);

            const outCost = (out / 1e6) * pricing.out;
            const uncIn = (ctx / 1e6) * pricing.in;
            let cacIn;
            if (firstSub || postComp) {
              cacIn = (ctx / 1e6) * pricing.cacheWrite;
            } else {
              const rd = Math.max(0, prevSubIn);
              const wr = Math.max(0, ctx - prevSubIn);
              cacIn =
                (rd / 1e6) * pricing.cacheRead +
                (wr / 1e6) * pricing.cacheWrite;
            }
            totalUncached += uncIn + outCost;
            totalCached += cacIn + outCost;
            prevSubIn = ctx;
            firstSub = false;
            if (postComp) postComp = false;
            ctx += out;
          }
        }
        return {
          totalUncached,
          totalCached,
          agpEstimate: data.usage?.estimatedCost || 0,
        };
      }

      // ═══ Formatting ═══
      function fmt$(n) {
        return n < 0.01 && n > 0 ? "<$0.01" : "$" + n.toFixed(2);
      }
      function fmtK(n) {
        return n >= 1e6
          ? (n / 1e6).toFixed(1) + "M"
          : n >= 1e3
            ? (n / 1e3).toFixed(1) + "k"
            : String(Math.round(n));
      }
      function escH(s) {
        const d = document.createElement("div");
        d.textContent = s || "";
        return d.innerHTML;
      }
      function fmtTime(iso) {
        if (!iso) return "—";
        try {
          const d = new Date(iso);
          return d.toLocaleString("zh-CN", {
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
          });
        } catch {
          return iso;
        }
      }

      // ═══ Markdown Rendering ═══
      function renderMd(text) {
        if (!text) return "";
        try {
          marked.setOptions({
            breaks: true,
            gfm: true,
            highlight: function (code, lang) {
              if (lang && hljs.getLanguage(lang)) {
                return hljs.highlight(code, { language: lang }).value;
              }
              return hljs.highlightAuto(code).value;
            },
          });
          return marked.parse(text);
        } catch {
          return "<p>" + escH(text).replace(/\n/g, "<br>") + "</p>";
        }
      }

      // ═══ Model display name ═══
      function getModelName(modelId) {
        const p = PRICING[modelId];
        return p
          ? p.name
          : modelId?.replace(/^MODEL_/, "").replace(/_/g, " ") || "Unknown";
      }

      // ═══ Render the viewer ═══
      function renderViewer(data) {
        currentData = data;
        document.getElementById("viewer").style.display = "block";
        document.getElementById("dropzone").style.display = "none";

        // ── Meta Panel ──
        const costs = calcCosts(data);
        const usage = data.usage || {};
        const msgs = data.messages || [];
        const userMsgs = msgs.filter((m) => m.type === "user").length;
        const assistantMsgs = msgs.filter((m) => m.type === "assistant").length;
        const checkpoints = msgs.filter((m) => m.type === "checkpoint").length;

        const duration =
          data.createdTime && data.lastModifiedTime
            ? (() => {
                const ms =
                  new Date(data.lastModifiedTime) - new Date(data.createdTime);
                const mins = Math.round(ms / 60000);
                return mins >= 60
                  ? Math.floor(mins / 60) + "h " + (mins % 60) + "m"
                  : mins + "m";
              })()
            : "—";

        document.getElementById("metaPanel").innerHTML = `
          <h2>${escH(data.title || data.cascadeId || "Untitled")}</h2>
          <div class="subtitle">${escH(data.modelDisplayName || getModelName(data.model))} · ${fmtTime(data.createdTime)} → ${fmtTime(data.lastModifiedTime)} · ${duration}</div>
          <div class="meta-grid">
            <div class="meta-item"><div class="lbl">对话轮次</div><div class="val">${userMsgs}</div></div>
            <div class="meta-item"><div class="lbl">AI 回复数</div><div class="val">${assistantMsgs}</div></div>
            <div class="meta-item"><div class="lbl">检查点</div><div class="val">${checkpoints}</div></div>
            <div class="meta-item"><div class="lbl">总步骤</div><div class="val">${data.stepCount || msgs.length}</div></div>
            <div class="meta-item"><div class="lbl">上下文使用</div><div class="val">${fmtK(usage.contextUsed || usage.totalInputTokens || 0)}</div></div>
            <div class="meta-item"><div class="lbl">压缩</div><div class="val" style="color:${usage.compressionDetected ? "var(--accent-amber)" : "var(--text-dim)"}">${usage.compressionDetected ? "检测到" : "无"}</div></div>
          </div>
        `;

        // ── Cost Row ──
        document.getElementById("costRow").innerHTML = `
          <div class="cost-card uncached">
            <div class="clabel">💥 无缓存 API</div>
            <div class="cprice">${fmt$(costs.totalUncached)}</div>
            <div class="csub">中转站 / 随机轮询</div>
          </div>
          <div class="cost-card cached">
            <div class="clabel">✨ 有缓存 API</div>
            <div class="cprice">${fmt$(costs.totalCached)}</div>
            <div class="csub">官方 API + Cache</div>
          </div>
          <div class="cost-card agp">
            <div class="clabel">📝 AGP 估算</div>
            <div class="cprice">${fmt$(costs.agpEstimate)}</div>
            <div class="csub">Checkpoint 快照</div>
          </div>
        `;

        // ── Timeline ──
        renderTimeline(msgs);
      }

      function renderTimeline(msgs) {
        const timeline = document.getElementById("timeline");
        let html = "";

        for (let i = 0; i < msgs.length; i++) {
          const msg = msgs[i];
          const msgType = msg.type || "unknown";

          if (msgType === "checkpoint") {
            html += renderCheckpoint(msg, i);
          } else if (msgType === "user") {
            html += renderUserMsg(msg, i);
          } else if (msgType === "assistant") {
            html += renderAssistantMsg(msg, i);
          }
        }

        timeline.innerHTML = html;

        // Apply syntax highlighting to any remaining code blocks
        timeline.querySelectorAll("pre code").forEach((el) => {
          try {
            hljs.highlightElement(el);
          } catch {}
        });
      }

      function renderCheckpoint(msg, idx) {
        const t = msg.tokens || {};
        return `<div class="msg-card checkpoint" data-type="checkpoint" data-idx="${idx}">
          <div class="checkpoint-info">
            <span class="cp-label">📊 Checkpoint</span>
            <span class="cp-stat">Input: <span>${fmtK(t.input || 0)}</span></span>
            <span class="cp-stat">Output: <span>${fmtK(t.output || 0)}</span></span>
            ${t.cacheRead ? `<span class="cp-stat">Cache: <span>${fmtK(t.cacheRead)}</span></span>` : ""}
            <span class="msg-step">step ${msg.stepIndex}</span>
          </div>
        </div>`;
      }

      function renderUserMsg(msg, idx) {
        const content = msg.content || "";
        const needsTruncate = content.length > 2000;
        const displayContent = needsTruncate
          ? content.slice(0, 2000) + "\n\n..."
          : content;

        return `<div class="msg-card user" data-type="user" data-idx="${idx}" data-text="${escAttr(content)}">
          <div class="msg-header">
            <span class="msg-role">👤 用户</span>
            <span class="msg-step">step ${msg.stepIndex}</span>
          </div>
          <div class="${needsTruncate ? "content-truncated" : ""}" id="wrap-${idx}">
            <div class="msg-content">${renderMd(displayContent)}</div>
          </div>
          ${needsTruncate ? `<button class="expand-btn" onclick="expandContent(${idx}, 'user')">展开完整内容 (${content.length} 字符)</button>` : ""}
        </div>`;
      }

      function renderAssistantMsg(msg, idx) {
        const content = msg.content || "";
        const needsTruncate = content.length > 3000;
        const displayContent = needsTruncate
          ? content.slice(0, 3000) + "\n\n..."
          : content;
        const hasThinking = !!msg.thinking;
        const hasTools = msg.toolCalls && msg.toolCalls.length > 0;

        let panels = "";

        // Thinking panel
        if (hasThinking) {
          panels += `<div class="panel thinking">
            <div class="panel-header" onclick="togglePanel(this)">
              🧠 AI 推理过程 <span style="color:var(--text-dim);font-weight:400;font-size:0.72rem">(${msg.thinking.length} 字符)</span>
              <span class="arrow">▼</span>
            </div>
            <div class="panel-body thinking-panel">${escH(msg.thinking)}</div>
          </div>`;
        }

        // Tool calls panel
        if (hasTools) {
          let toolsHtml = "";
          for (const tc of msg.toolCalls) {
            let argsDisplay = tc.args || "";
            try {
              const parsed = JSON.parse(argsDisplay);
              argsDisplay = JSON.stringify(parsed, null, 2);
            } catch {}
            toolsHtml += `<div class="tool-call">
              <div class="tool-name">🔧 ${escH(tc.name)}</div>
              <div class="tool-args">${escH(argsDisplay)}</div>
            </div>`;
          }
          panels += `<div class="panel tool">
            <div class="panel-header" onclick="togglePanel(this)">
              🔧 工具调用 <span style="color:var(--text-dim);font-weight:400;font-size:0.72rem">(${msg.toolCalls.length} 个)</span>
              <span class="arrow">▼</span>
            </div>
            <div class="panel-body tool-panel">${toolsHtml}</div>
          </div>`;
        }

        const modelTag = msg.model
          ? `<span class="msg-model-tag">${getModelName(msg.model)}</span>`
          : "";

        return `<div class="msg-card assistant" data-type="assistant" data-idx="${idx}" data-text="${escAttr(content + (msg.thinking || ""))}">
          <div class="msg-header">
            <span class="msg-role">🤖 AI</span>
            <span class="msg-step">step ${msg.stepIndex}</span>
            ${modelTag}
            ${hasThinking ? '<span style="font-size:0.7rem;color:var(--accent-amber)">🧠</span>' : ""}
            ${hasTools ? '<span style="font-size:0.7rem;color:var(--accent-blue)">🔧×' + msg.toolCalls.length + "</span>" : ""}
          </div>
          ${
            content
              ? `<div class="${needsTruncate ? "content-truncated" : ""}" id="wrap-${idx}">
            <div class="msg-content">${renderMd(displayContent)}</div>
          </div>
          ${needsTruncate ? `<button class="expand-btn" onclick="expandContent(${idx}, 'assistant')">展开完整内容 (${content.length} 字符)</button>` : ""}`
              : ""
          }
          ${panels}
        </div>`;
      }

      function escAttr(s) {
        return (s || "")
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .slice(0, 500);
      }

      // ═══ Interactions ═══

      // Expand truncated content
      function expandContent(idx, type) {
        const msg = currentData.messages[idx];
        const wrap = document.getElementById("wrap-" + idx);
        if (!wrap) return;
        wrap.classList.remove("content-truncated");
        wrap.querySelector(".msg-content").innerHTML = renderMd(msg.content);
        // Re-highlight code
        wrap.querySelectorAll("pre code").forEach((el) => {
          try {
            hljs.highlightElement(el);
          } catch {}
        });
        // Remove expand button
        const btn = wrap.parentElement.querySelector(".expand-btn");
        if (btn) btn.remove();
      }

      // Toggle collapsible panel
      function togglePanel(header) {
        header.classList.toggle("open");
        const body = header.nextElementSibling;
        body.classList.toggle("open");
      }

      // Toggle all panels of a type
      function toggleAllPanels(type) {
        allPanelStates[type] = !allPanelStates[type];
        const panels = document.querySelectorAll(`.panel.${type}`);
        panels.forEach((p) => {
          const header = p.querySelector(".panel-header");
          const body = p.querySelector(".panel-body");
          if (allPanelStates[type]) {
            header.classList.add("open");
            body.classList.add("open");
          } else {
            header.classList.remove("open");
            body.classList.remove("open");
          }
        });
        // Update button text
        const btnId =
          type === "thinking" ? "toggleThinkingBtn" : "toggleToolsBtn";
        const btn = document.getElementById(btnId);
        const label = type === "thinking" ? "🧠 推理" : "🔧 工具";
        btn.textContent = allPanelStates[type]
          ? label.replace("展开", "") + " 收起"
          : label + " 展开";
        btn.classList.toggle("active", allPanelStates[type]);
      }

      // Filter messages by type
      function setFilter(filter, btn) {
        currentFilter = filter;
        document
          .querySelectorAll(".filter-group .btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");

        document.querySelectorAll(".msg-card").forEach((card) => {
          const type = card.dataset.type;
          if (filter === "all" || type === filter) {
            card.classList.remove("filtered-out");
          } else {
            card.classList.add("filtered-out");
          }
        });
      }

      // Search
      let searchTimeout = null;
      document
        .getElementById("searchBox")
        .addEventListener("input", function () {
          clearTimeout(searchTimeout);
          searchTimeout = setTimeout(() => performSearch(this.value), 200);
        });

      function performSearch(query) {
        const cards = document.querySelectorAll(".msg-card");
        const countEl = document.getElementById("searchCount");

        if (!query || query.length < 2) {
          cards.forEach((c) => {
            c.classList.remove("search-miss", "search-hit");
          });
          countEl.textContent = "";
          // Remove highlights
          document.querySelectorAll("mark.search-hl").forEach((m) => {
            m.replaceWith(m.textContent);
          });
          return;
        }

        const lowerQ = query.toLowerCase();
        let hits = 0;

        cards.forEach((card) => {
          const text = card.dataset.text || card.textContent || "";
          if (text.toLowerCase().includes(lowerQ)) {
            card.classList.add("search-hit");
            card.classList.remove("search-miss");
            hits++;
          } else {
            card.classList.add("search-miss");
            card.classList.remove("search-hit");
          }
        });

        countEl.textContent = `${hits} 条匹配`;
      }

      // ═══ Theme Toggle ═══
      const themeToggle = document.getElementById("themeToggle");
      function updateToggleIcon() {
        const theme = document.documentElement.getAttribute("data-theme");
        themeToggle.textContent = theme === "dark" ? "☀️" : "🌙";
      }
      updateToggleIcon();
      themeToggle.addEventListener("click", () => {
        const current = document.documentElement.getAttribute("data-theme");
        const next = current === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("agp-viewer-theme", next);
        updateToggleIcon();
      });

      // ═══ File Handling ═══
      const dropzone = document.getElementById("dropzone");
      const fileInput = document.getElementById("fileInput");

      dropzone.addEventListener("click", () => fileInput.click());
      dropzone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropzone.classList.add("drag-over");
      });
      dropzone.addEventListener("dragleave", () =>
        dropzone.classList.remove("drag-over"),
      );
      dropzone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropzone.classList.remove("drag-over");
        handleFile(e.dataTransfer.files[0]);
      });
      fileInput.addEventListener("change", (e) =>
        handleFile(e.target.files[0]),
      );

      async function handleFile(file) {
        if (!file) return;
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          if (!data.messages) {
            alert("无效的 AGP 导出文件：缺少 messages 字段");
            return;
          }
          renderViewer(data);
        } catch (e) {
          alert("解析文件失败：" + e.message);
        }
      }

      // Allow loading another file after initial load
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && currentData) {
          document.getElementById("viewer").style.display = "none";
          document.getElementById("dropzone").style.display = "";
          currentData = null;
        }
      });
    </script>
  </body>
</html>
